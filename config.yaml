scan:
  disks:
    - "C:\\"
  project_roots:
    - "%USERPROFILE%\\source"
    - "%USERPROFILE%"
    - "%USERPROFILE%\\projects"
    - "C:\\Projects"
  disk_usage_roots:
    - "C:\\Program Files"
    - "C:\\Program Files (x86)"
    - "%LOCALAPPDATA%"
    - "%USERPROFILE%"
  exclude_paths:
    - "C:\\Windows"
    - "C:\\Program Files\\WindowsApps"
    - "C:\\$Recycle.Bin"
    - "C:\\System Volume Information"
    - "%USERPROFILE%\\AppData"
  max_depth: 2

report:
  output_dir: "./data/output"
  formats:
    - "csv"
    - "json"

logging:
  level: "INFO"
  log_to_file: false
  log_dir: "./data/output/logs"

behavior:
  read_only: true
  allow_delete: false
  allow_uninstall: false
